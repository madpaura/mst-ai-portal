
services:
  # ── PostgreSQL ────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mst_portal}
      POSTGRES_USER: ${POSTGRES_USER:-portal}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-portal123}
    volumes:
      - "${PG_DATA_VOLUME}:/var/lib/postgresql/data"
      - ./db/init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    ports:
      - "127.0.0.1:${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U portal -d mst_portal"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Redis Cache ──────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --save "" --appendonly no
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── FastAPI Backend ───────────────────────────────────────
  backend:
    image: mst-portal-backend:latest
    build:
      context: ./api
      dockerfile: Dockerfile
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-portal}:${POSTGRES_PASSWORD:-portal123}@db:5432/${POSTGRES_DB:-mst_portal}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      REDIS_ENABLED: ${REDIS_ENABLED:-true}
      REDIS_DEFAULT_TTL: ${REDIS_DEFAULT_TTL:-300}
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      AUTH_MODE: ${AUTH_MODE:-open}
      VIDEO_STORAGE_PATH: /data/videos
      MEDIA_STORAGE_PATH: /data/media
      FFMPEG_PATH: ffmpeg
      REMOTION_BANNER_PATH: /remotion-banner
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      PORTAL_URL: ${PORTAL_URL:-http://localhost:9810}
      # Public portal base used for "View on Portal" links in publish/review
      # emails. Falls back to PORTAL_URL when not set separately.
      PORTAL_BASE_URL: ${PORTAL_BASE_URL:-${PORTAL_URL:-http://localhost:9810}}
      EMAIL_SUBJECT_PREFIX: ${EMAIL_SUBJECT_PREFIX:-MSTAI-TF}
      CORS_ORIGINS: ${CORS_ORIGINS:-["*"]}
      CORS_ALLOW_ORIGIN_REGEX: ${CORS_ALLOW_ORIGIN_REGEX:-}
      SAML_SP_ENTITY_ID: ${SAML_SP_ENTITY_ID:-}
      SAML_SP_ACS_URL: ${SAML_SP_ACS_URL:-}
      SAML_SP_SLS_URL: ${SAML_SP_SLS_URL:-}
      SAML_IDP_ENTITY_ID: ${SAML_IDP_ENTITY_ID:-}
      SAML_IDP_SSO_URL: ${SAML_IDP_SSO_URL:-}
      SAML_IDP_SLO_URL: ${SAML_IDP_SLO_URL:-}
      SAML_IDP_CERT: ${SAML_IDP_CERT:-}
      SAML_SP_CERT: ${SAML_SP_CERT:-}
      SAML_SP_KEY: ${SAML_SP_KEY:-}
      SAML_GROUP_ROLE_MAP: ${SAML_GROUP_ROLE_MAP:-}
      SAML_DEFAULT_ROLE: ${SAML_DEFAULT_ROLE:-user}
      SAML_STRICT: ${SAML_STRICT:-true}
      SAML_SETTINGS_PATH: ${SAML_SETTINGS_PATH:-/app/saml/settings.json}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      # Number of uvicorn worker processes (use more cores under load).
      # Startup migration + forge scheduler are advisory-lock guarded, so they
      # run once regardless of worker count.
      UVICORN_WORKERS: ${UVICORN_WORKERS:-4}
      # Flush stdout immediately so per-worker logs appear in `docker logs`.
      PYTHONUNBUFFERED: "1"
    volumes:
      - "${VIDEO_DATA_VOLUME}:/data/videos"
      - "${MEDIA_DATA_VOLUME}:/data/media"
      - ./remotion-banner:/remotion-banner
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── Transcoder Worker ────────────────────────────────────
  # By default uses CPU encoding (libx264).
  # For GPU (NVENC) acceleration, use: docker-compose -f docker-compose.yml -f docker-compose.gpu.yml up -d
  # Or run ./setup.sh deploy which auto-detects GPU availability.
  worker:
    image: mst-portal-worker:latest
    build:
      context: ./api
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-portal}:${POSTGRES_PASSWORD:-portal123}@db:5432/${POSTGRES_DB:-mst_portal}
      VIDEO_STORAGE_PATH: /data/videos
      FFMPEG_PATH: ffmpeg
      FFMPEG_HWACCEL: ${FFMPEG_HWACCEL:-auto}
      PYTHONUNBUFFERED: "1"
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - "${VIDEO_DATA_VOLUME}:/data/videos"
    command: ["python", "worker/transcoder.py"]
    deploy:
      resources:
        limits:
          cpus: "${WORKER_CPU_LIMIT:-4.0}"
          memory: "${WORKER_MEM_LIMIT:-4g}"
        reservations:
          cpus: "0.25"
          memory: 256m
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h db -U ${POSTGRES_USER:-portal} -d ${POSTGRES_DB:-mst_portal} || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Auto-Mode Processor ─────────────────────────────────
  # Handles transcript → LLM metadata/chapters/howto pipeline.
  # Uses the same image as the main worker (no separate Dockerfile needed).
  auto-processor:
    image: mst-portal-worker:latest
    build:
      context: ./api
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-portal}:${POSTGRES_PASSWORD:-portal123}@db:5432/${POSTGRES_DB:-mst_portal}
      VIDEO_STORAGE_PATH: /data/videos
      FFMPEG_PATH: ffmpeg
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      # Needed for the "Ready to publish" email links — this worker sends them.
      PORTAL_URL: ${PORTAL_URL:-http://localhost:9810}
      PORTAL_BASE_URL: ${PORTAL_BASE_URL:-${PORTAL_URL:-http://localhost:9810}}
      # SMTP — auto-ready notification is sent from this worker
      SMTP_SERVER: ${SMTP_SERVER:-localhost}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-noreply@mst-ai-portal.local}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-MST AI Portal}
      EMAIL_SUBJECT_PREFIX: ${EMAIL_SUBJECT_PREFIX:-MSTAI-TF}
      AUTO_POLL_INTERVAL: "5"
      AUTO_PROCESSOR_CONCURRENCY: ${AUTO_PROCESSOR_CONCURRENCY:-4}
      TRANSCRIPT_MOCK: ${TRANSCRIPT_MOCK:-false}
      PYTHONUNBUFFERED: "1"
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - "${VIDEO_DATA_VOLUME}:/data/videos"
    command: ["python", "worker/auto_processor.py"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    deploy:
      resources:
        limits:
          cpus: "${AUTO_PROCESSOR_CPU_LIMIT:-2.0}"
          memory: "${AUTO_PROCESSOR_MEM_LIMIT:-2g}"
        reservations:
          cpus: "0.1"
          memory: 128m
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h db -U ${POSTGRES_USER:-portal} -d ${POSTGRES_DB:-mst_portal} || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── React Frontend (nginx) ───────────────────────────────
  frontend:
    image: mst-portal-frontend:latest
    build:
      context: ./react-portal
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:${BACKEND_PORT:-8000}}
        VITE_AUTH_MODE: ${AUTH_MODE:-open}
        VITE_BETA_TAG: ${VITE_BETA_TAG:-}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-9810}:80"
    # Mount the video storage read-only so nginx serves HLS/stream assets
    # directly from disk (see the /streams locations in nginx.conf.template),
    # keeping segment fetches off the Python backend.
    volumes:
      - "${VIDEO_DATA_VOLUME}:/data/videos:ro"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80/ >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  pg-data:
  video-data:
  media-data:
