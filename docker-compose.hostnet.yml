# Host-Network Override
# ─────────────────────────────────────────────────────────────────────────────
# Enable when the isolated Docker bridge network causes connectivity issues:
#   • host.docker.internal not resolving on some Linux hosts
#   • Corporate firewalls blocking the docker0 interface
#   • Restricted/overlapping bridge subnets
#   • LLM / Ollama / on-host services unreachable from containers
#
# Enable via .env:   HOST_NETWORK=true   then ./setup.sh deploy
# Or manually:
#   docker compose -f docker-compose.yml \
#                  -f docker-compose.transcript.yml \
#                  -f docker-compose.hostnet.yml up -d
#
# In host mode every container shares the host's network namespace, so:
#   • Service-name DNS (db, redis, backend, transcript-service) no longer works
#     → URLs are rewritten to 127.0.0.1 here
#   • `ports:` mappings are ignored (each container binds directly to the host
#     port its process listens on)
#   • `extra_hosts:` is unused (the host IS localhost)
#
# Host-port layout in this mode (all on 127.0.0.1):
#   db                5432
#   redis             6379
#   backend           ${BACKEND_PORT:-8000}     (set BACKEND_PORT_INTERNAL if 8000 is taken)
#   frontend (nginx)  ${FRONTEND_PORT:-9810}
#   transcript        ${TRANSCRIPT_PORT:-9100}
#   skillspector      ${SKILLSPECTOR_PORT:-9200}
#
# Note: host networking is Linux-only. On Docker Desktop (Mac/Windows) it works
# starting from 4.34 as a beta feature; the default bridge mode is recommended
# there.

services:
  db:
    network_mode: host

  redis:
    network_mode: host

  backend:
    network_mode: host
    # host.docker.internal is not needed — the host IS localhost
    extra_hosts: !reset []
    # In bridge mode the base file maps host BACKEND_PORT → container 8000.
    # In host mode there is no port mapping, so uvicorn must bind directly
    # to BACKEND_PORT (the port the browser-baked VITE_API_URL is pointing at).
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "${BACKEND_PORT:-8000}"]
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:${BACKEND_PORT:-8000}/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    environment:
      # Service-name URLs are unconditionally rewritten in host mode; any
      # leftover "redis://redis:..." or "host.docker.internal" from .env
      # would not resolve here.
      DATABASE_URL: postgresql://${POSTGRES_USER:-portal}:${POSTGRES_PASSWORD:-portal123}@127.0.0.1:5432/${POSTGRES_DB:-mst_portal}
      REDIS_URL: redis://127.0.0.1:6379/0
      OLLAMA_BASE_URL: http://127.0.0.1:11434
      # Service-name DNS ("skillspector") doesn't resolve in host mode.
      SKILLSPECTOR_SERVICE_URL: http://127.0.0.1:${SKILLSPECTOR_PORT:-9200}

  skillspector:
    network_mode: host
    extra_hosts: !reset []
    # Bind uvicorn directly to the host port (no port mapping in host mode).
    command: ["uvicorn", "app:app", "--host", "0.0.0.0", "--port", "${SKILLSPECTOR_PORT:-9200}"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${SKILLSPECTOR_PORT:-9200}/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  worker:
    network_mode: host
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-portal}:${POSTGRES_PASSWORD:-portal123}@127.0.0.1:5432/${POSTGRES_DB:-mst_portal}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -U ${POSTGRES_USER:-portal} -d ${POSTGRES_DB:-mst_portal} || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  auto-processor:
    network_mode: host
    extra_hosts: !reset []
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-portal}:${POSTGRES_PASSWORD:-portal123}@127.0.0.1:5432/${POSTGRES_DB:-mst_portal}
      OLLAMA_BASE_URL: http://127.0.0.1:11434
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -U ${POSTGRES_USER:-portal} -d ${POSTGRES_DB:-mst_portal} || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    network_mode: host
    environment:
      # nginx binds directly on the host — its template needs to listen on the
      # user-facing port and proxy to the backend on its real host port.
      NGINX_LISTEN: ${FRONTEND_PORT:-9810}
      BACKEND_UPSTREAM: 127.0.0.1:${BACKEND_PORT:-8000}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:${FRONTEND_PORT:-9810}/ >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  transcript-service:
    network_mode: host
    # Bind uvicorn directly to TRANSCRIPT_PORT (no port mapping in host mode).
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "${TRANSCRIPT_PORT:-9100}", "--workers", "1"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${TRANSCRIPT_PORT:-9100}/health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 300s
