# MST AI Portal — nginx reverse proxy
# Domain : mst.ai.samsungds.net
# Frontend: localhost:9810  (React / docker)
# Backend : localhost:9800  (FastAPI / docker)
#
# Browser calls use /backend/... which nginx strips before forwarding
# to the FastAPI container, so the API's own routes stay unchanged.

server {
    listen 80;
    listen [::]:80;
    server_name mst.ai.samsungds.net;

    # ── Logging ────────────────────────────────────────────────────────────
    access_log /var/log/nginx/mst-ai-portal.access.log;
    error_log  /var/log/nginx/mst-ai-portal.error.log warn;

    # ── Large uploads (video files) ────────────────────────────────────────
    client_max_body_size 10G;
    client_body_timeout  600s;

    # ── Backend API  (/backend/ → FastAPI on :9800) ────────────────────────
    location /backend/ {
        proxy_pass         http://127.0.0.1:9800/;   # trailing slash strips /backend prefix
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE / streaming responses (transcripts, progress)
        proxy_buffering        off;
        proxy_cache            off;
        proxy_read_timeout     600s;
        proxy_send_timeout     600s;
        proxy_connect_timeout  10s;

        # WebSocket upgrade (future-proof)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ── HLS / media served directly by FastAPI ─────────────────────────────
    location /media/ {
        proxy_pass         http://127.0.0.1:9800/media/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_buffering    off;
        proxy_read_timeout 300s;
        add_header         Cache-Control "public, max-age=3600";
    }

    # ── Frontend (React SPA on :9810) ──────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:9810/;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket (Vite HMR in dev; harmless in prod)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 60s;
    }
}
