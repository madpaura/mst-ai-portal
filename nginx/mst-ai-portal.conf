# MST AI Portal — nginx reverse proxy
# Domain : mst.ai.samsungds.net
# Frontend: localhost:9810  (React / docker)
# Backend : localhost:9800  (FastAPI / docker)
#
# Browser calls use /backend/... which nginx strips before forwarding
# to the FastAPI container, so the API's own routes stay unchanged.

# Only send "Connection: upgrade" when the client actually requests a
# WebSocket; otherwise send an empty header so upstream keepalive works.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      '';
}

# Persistent connection pools to the containers — avoids a new TCP
# connection per proxied request.
upstream mst_backend {
    server 127.0.0.1:9800;
    keepalive 64;
}

upstream mst_frontend {
    server 127.0.0.1:9810;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name mst.ai.samsungds.net;

    # ── Logging ────────────────────────────────────────────────────────────
    access_log /var/log/nginx/mst-ai-portal.access.log;
    error_log  /var/log/nginx/mst-ai-portal.error.log warn;

    # ── Large uploads (video files) ────────────────────────────────────────
    client_max_body_size 10G;
    client_body_timeout  600s;

    # ── HLS / media — served from disk by the frontend container ───────────
    # The frontend nginx mounts the video/media volumes read-only and serves
    # these paths with sendfile (see react-portal/nginx.conf.template), so
    # they must NOT fall through to the FastAPI proxy below. `^~` outranks
    # the /backend/ prefix location.
    location ^~ /backend/streams/ {
        proxy_pass         http://mst_frontend;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host $host;
        access_log         off;
    }

    location ^~ /streams/ {
        proxy_pass         http://mst_frontend;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host $host;
        access_log         off;
    }

    location ^~ /backend/media/ {
        proxy_pass         http://mst_frontend;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host $host;
        access_log         off;
    }

    location ^~ /media/ {
        proxy_pass         http://mst_frontend;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";
        proxy_set_header   Host $host;
        access_log         off;
    }

    # ── Backend API  (/backend/ → FastAPI on :9800) ────────────────────────
    location /backend/ {
        proxy_pass         http://mst_backend/;   # trailing slash strips /backend prefix
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /backend;

        # Buffering stays ON so backend connections are released as soon as
        # nginx absorbs the response, instead of being pinned to slow clients.
        # SSE endpoints (assistant chat) opt out per-response by sending
        # X-Accel-Buffering: no.
        proxy_read_timeout     600s;
        proxy_send_timeout     600s;
        proxy_connect_timeout  10s;

        # WebSocket upgrade only when requested (see map above) — an
        # unconditional "upgrade" header would disable upstream keepalive.
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    # ── Frontend (React SPA on :9810) ──────────────────────────────────────
    location / {
        proxy_pass         http://mst_frontend;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket (Vite HMR in dev; harmless in prod)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_read_timeout 60s;
    }
}
