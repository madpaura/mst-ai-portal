worker_processes  auto;

error_log  /var/log/nginx/error.log notice;
pid        /tmp/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    # Cache policy for directly-served stream assets: HLS manifests/segments must
    # never be cached (they change as a video is (re)processed); thumbnails and
    # raw mp4 may be cached. Consumed by the /streams locations served from disk.
    map $uri $stream_cache {
        default          "public, max-age=86400";
        ~*\.(m3u8|ts)$   "no-cache, no-store, must-revalidate";
    }

    sendfile        on;
    tcp_nopush      on;

    keepalive_timeout  65;

    # Rewrite temp paths to /tmp so nginx user can write them
    client_body_temp_path /tmp/client_body;
    proxy_temp_path       /tmp/proxy;
    fastcgi_temp_path     /tmp/fastcgi;
    uwsgi_temp_path       /tmp/uwsgi;
    scgi_temp_path        /tmp/scgi;

    include /etc/nginx/conf.d/*.conf;
}
