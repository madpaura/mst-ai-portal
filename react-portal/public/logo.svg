<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Background -->
  <rect width="100" height="100" rx="22" fill="#0D1F35"/>
  <!-- Subtle grid -->
  <g stroke="#258CF4" stroke-width="0.5" opacity="0.07">
    <line x1="0" y1="33" x2="100" y2="33"/>
    <line x1="0" y1="50" x2="100" y2="50"/>
    <line x1="0" y1="67" x2="100" y2="67"/>
    <line x1="33" y1="0" x2="33" y2="100"/>
    <line x1="50" y1="0" x2="50" y2="100"/>
    <line x1="67" y1="0" x2="67" y2="100"/>
  </g>
  <!-- Inner glow -->
  <circle cx="50" cy="50" r="26" fill="#258CF4" opacity="0.06"/>
  <!-- Chip pins — top -->
  <rect x="32" y="9" width="5.5" height="14" rx="2" fill="#258CF4" opacity="0.72"/>
  <rect x="47.25" y="9" width="5.5" height="14" rx="2" fill="#258CF4" opacity="0.95"/>
  <rect x="62.5" y="9" width="5.5" height="14" rx="2" fill="#258CF4" opacity="0.72"/>
  <!-- Chip pins — bottom -->
  <rect x="32" y="77" width="5.5" height="14" rx="2" fill="#258CF4" opacity="0.72"/>
  <rect x="47.25" y="77" width="5.5" height="14" rx="2" fill="#258CF4" opacity="0.95"/>
  <rect x="62.5" y="77" width="5.5" height="14" rx="2" fill="#258CF4" opacity="0.72"/>
  <!-- Chip pins — left -->
  <rect x="9" y="32" width="14" height="5.5" rx="2" fill="#258CF4" opacity="0.72"/>
  <rect x="9" y="47.25" width="14" height="5.5" rx="2" fill="#258CF4" opacity="0.95"/>
  <rect x="9" y="62.5" width="14" height="5.5" rx="2" fill="#258CF4" opacity="0.72"/>
  <!-- Chip pins — right -->
  <rect x="77" y="32" width="14" height="5.5" rx="2" fill="#258CF4" opacity="0.72"/>
  <rect x="77" y="47.25" width="14" height="5.5" rx="2" fill="#258CF4" opacity="0.95"/>
  <rect x="77" y="62.5" width="14" height="5.5" rx="2" fill="#258CF4" opacity="0.72"/>
  <!-- Chip body -->
  <rect x="23" y="23" width="54" height="54" rx="10" fill="#091525" stroke="#258CF4" stroke-width="1.5"/>
  <!-- "M" neural trace -->
  <path d="M34 63 L34 37 L50 51 L66 37 L66 63"
        stroke="#258CF4" stroke-width="2.5"
        stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Corner nodes -->
  <circle cx="34" cy="37" r="4" fill="#258CF4"/>
  <circle cx="66" cy="37" r="4" fill="#258CF4"/>
  <circle cx="34" cy="63" r="4" fill="#258CF4"/>
  <circle cx="66" cy="63" r="4" fill="#258CF4"/>
  <!-- Center peak node -->
  <circle cx="50" cy="51" r="5.5" fill="#4AABFF"/>
  <circle cx="50" cy="51" r="2.5" fill="white"/>
</svg>
