<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="x-apple-disable-message-reformatting">
<title>MST AI Portal — What It Offers</title>
</head>
<body style="margin:0;padding:0;background:#efefef;-webkit-text-size-adjust:100%;">
<!--
  Image-based announcement email. The poster is rendered to a single picture,
  sliced into linked regions, and laid out as a table so it renders identically
  in every client (Gmail/Outlook/Apple Mail). Each slice links to its section.
  Images are sent as CID inline attachments (self-contained, no hosting); the
  src="cid:<name>" values are matched to attachments by PosterSenderCard.
  Regenerate the slices via scripts/build_poster_email.py
-->
<table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" style="background:#efefef;">
  <tr>
    <td align="center" style="padding:16px 0;">
      <table role="presentation" width="800" cellpadding="0" cellspacing="0" border="0" style="width:800px;max-width:800px;border-collapse:collapse;background:#f7f7f8;">
        <!-- Header + hero + pillars → portal home -->
        <tr>
          <td colspan="2" style="padding:0;font-size:0;line-height:0;">
            <a href="https://mst.ai.samsungds.net" target="_blank" style="text-decoration:none;">
              <img src="cid:band-top" width="800" alt="MST AI Portal — Learn. Leverage. Share. Introducing the internal AI tools & collaboration portal." style="display:block;width:100%;max-width:800px;height:auto;border:0;outline:none;">
            </a>
          </td>
        </tr>
        <!-- Row 1: Ignite | Hub -->
        <tr>
          <td width="400" style="padding:0;font-size:0;line-height:0;">
            <a href="https://mst.ai.samsungds.net/ignite" target="_blank" style="text-decoration:none;">
              <img src="cid:row1-left" width="400" alt="Ignite — Learn & Share Videos: AI-curated courses with chapters, transcripts & captions. Open Learn." style="display:block;width:100%;max-width:400px;height:auto;border:0;outline:none;">
            </a>
          </td>
          <td width="400" style="padding:0;font-size:0;line-height:0;">
            <a href="https://mst.ai.samsungds.net/marketplace" target="_blank" style="text-decoration:none;">
              <img src="cid:row1-right" width="400" alt="Hub — Agents, Skills & MCP: browse, install and publish AI agents, skills and MCP servers. Open Hub." style="display:block;width:100%;max-width:400px;height:auto;border:0;outline:none;">
            </a>
          </td>
        </tr>
        <!-- Row 2: Articles | Solutions -->
        <tr>
          <td width="400" style="padding:0;font-size:0;line-height:0;">
            <a href="https://mst.ai.samsungds.net/articles" target="_blank" style="text-decoration:none;">
              <img src="cid:row2-left" width="400" alt="Articles — Knowledge Base: read and write how-to guides and deep dives. Open Articles." style="display:block;width:100%;max-width:400px;height:auto;border:0;outline:none;">
            </a>
          </td>
          <td width="400" style="padding:0;font-size:0;line-height:0;">
            <a href="https://mst.ai.samsungds.net/" target="_blank" style="text-decoration:none;">
              <img src="cid:row2-right" width="400" alt="Solutions — SW / HW Showcase: explore internal software & hardware solutions. Open Solutions." style="display:block;width:100%;max-width:400px;height:auto;border:0;outline:none;">
            </a>
          </td>
        </tr>
        <!-- Jump strip → marketplace -->
        <tr>
          <td colspan="2" style="padding:0;font-size:0;line-height:0;">
            <a href="https://mst.ai.samsungds.net/marketplace" target="_blank" style="text-decoration:none;">
              <img src="cid:jump" width="800" alt="Jump straight in: Solutions, Learn, Agents, Skills, MCP, Articles, News, Contact." style="display:block;width:100%;max-width:800px;height:auto;border:0;outline:none;">
            </a>
          </td>
        </tr>
        <!-- Footer → portal home -->
        <tr>
          <td colspan="2" style="padding:0;font-size:0;line-height:0;">
            <a href="https://mst.ai.samsungds.net/" target="_blank" style="text-decoration:none;">
              <img src="cid:footer" width="800" alt="Built by MST AI TF, for all. Open Portal — mst.ai.samsungds.net" style="display:block;width:100%;max-width:800px;height:auto;border:0;outline:none;">
            </a>
          </td>
        </tr>
      </table>
      <!-- Plain-text fallback link row for image-blocked clients -->
      <table role="presentation" width="800" cellpadding="0" cellspacing="0" border="0" style="width:800px;max-width:800px;">
        <tr>
          <td align="center" style="padding:14px 16px;font-family:Arial,Helvetica,sans-serif;font-size:12px;color:#64748b;">
            Can't see the images? Open the portal at
            <a href="https://mst.ai.samsungds.net" target="_blank" style="color:#2563eb;text-decoration:none;font-weight:bold;">mst.ai.samsungds.net</a>
          </td>
        </tr>
      </table>
    </td>
  </tr>
</table>
</body>
</html>
