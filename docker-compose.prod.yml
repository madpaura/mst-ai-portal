# Production overrides for docker-compose.yml
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Key hardening applied here:
#   - db port NOT published (only reachable on internal Docker network)
#   - Postgres password must be set via env; insecure default rejected
#   - Resource limits on all services

services:
  db:
    ports: []    # remove host-binding; only backend/worker access db internally

  backend:
    environment:
      # Reject insecure defaults at runtime (startup check in config.py)
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set in production}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in production}
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "2"

  worker:
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "4"

  frontend:
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: "0.5"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
