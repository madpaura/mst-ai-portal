# Transcript Service — CPU-compatible base.
# Works on any host; defaults to CPU mode (slower but no GPU required).
#
# GPU hosts: also add -f docker-compose.transcript.gpu.yml (setup.sh does this automatically).
#
# Standalone usage:
#   TRANSCRIPT_API_KEY=<secret> docker compose -f docker-compose.transcript.yml up -d
#
# Then in Admin → Settings → Transcript Service, set:
#   URL:     http://<host-ip>:9100
#   API Key: <same secret>

services:
  transcript-service:
    build:
      context: ./transcript-service
      dockerfile: Dockerfile
    image: mst-transcript-service:latest
    restart: unless-stopped
    environment:
      TRANSCRIPT_API_KEY: ${TRANSCRIPT_API_KEY:-change-me}
      TRANSCRIPT_MODEL: ${TRANSCRIPT_MODEL:-large-v3}
      TRANSCRIPT_DEVICE: ${TRANSCRIPT_DEVICE:-cpu}
      TRANSCRIPT_COMPUTE: ${TRANSCRIPT_COMPUTE:-int8}
    ports:
      - "${TRANSCRIPT_PORT:-9100}:9100"
    volumes:
      - transcript-model-cache:/root/.cache/huggingface
    deploy:
      resources:
        limits:
          cpus: "${TRANSCRIPT_CPU_LIMIT:-4.0}"
          memory: "${TRANSCRIPT_MEM_LIMIT:-6g}"
        reservations:
          cpus: "0.5"
          memory: 1g
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9100/health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 300s

volumes:
  transcript-model-cache:
