# GPU overlay for the transcript service — layered on top of docker-compose.transcript.yml.
# Adds nvidia runtime and switches to CUDA compute mode.
# setup.sh includes this automatically when an NVIDIA GPU is detected.

services:
  transcript-service:
    runtime: nvidia
    environment:
      TRANSCRIPT_DEVICE: ${TRANSCRIPT_DEVICE:-cuda}
      TRANSCRIPT_COMPUTE: ${TRANSCRIPT_COMPUTE:-float16}
    deploy:
      resources:
        limits:
          cpus: "${TRANSCRIPT_GPU_CPU_LIMIT:-2.0}"
          memory: "${TRANSCRIPT_GPU_MEM_LIMIT:-4g}"
        reservations:
          cpus: "0.5"
          memory: 512m
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
